<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem 1rem;
  }
  .app {
    text-align: center;
    max-width: 420px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
    color: #fff;
  }
  .sub {
    font-size: 12px;
    color: #555;
    margin-bottom: 1.2rem;
    letter-spacing: 0.05em;
  }
  .mode-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 1rem;
    width: 100%;
  }
  .mode-btn {
    padding: 6px 16px;
    border-radius: 999px;
    border: 1px solid #333;
    background: transparent;
    color: #888;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    flex: 1;
  }
  .mode-btn.active {
    border-color: #fff;
    color: #fff;
    background: #1a1a1a;
  }
  .options-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 0.8rem;
    width: 100%;
  }
  .opt-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .opt-input {
    flex: 1;
    padding: 9px 14px;
    font-size: 15px;
    border-radius: 8px;
    border: 1px solid #2a2a2a;
    background: #111;
    color: #f0f0f0;
    outline: none;
  }
  .opt-input:focus { border-color: #555; }
  .del-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid #2a2a2a;
    background: transparent;
    color: #555;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .del-btn:hover { border-color: #c0392b; color: #c0392b; }
  .add-btn {
    font-size: 12px;
    color: #555;
    background: transparent;
    border: 1px dashed #2a2a2a;
    border-radius: 8px;
    padding: 7px 14px;
    cursor: pointer;
    margin-bottom: 0.8rem;
    width: 100%;
  }
  .dice-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 0.8rem;
    width: 100%;
  }
  .dice-cell {
    padding: 10px 4px;
    font-size: 15px;
    border-radius: 8px;
    border: 1px solid #2a2a2a;
    background: #111;
    color: #f0f0f0;
    text-align: center;
    outline: none;
    width: 100%;
  }
  .go-btn {
    padding: 14px 0;
    font-size: 15px;
    font-weight: 600;
    border-radius: 12px;
    border: 1px solid #333;
    background: #111;
    color: #fff;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all .15s;
  }
  .go-btn:hover { background: #1a1a1a; border-color: #555; }
  .go-btn:active { transform: scale(0.98); }
  .stage {
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0.8rem auto 0;
  }
  .baton {
    width: 120px;
    height: 120px;
    object-fit: contain;
    transition: opacity .2s, transform .2s;
    mix-blend-mode: lighten;
  }
  .baton.hide { opacity: 0; transform: scale(0.85); }
  @keyframes wobble {
    0%{transform:rotate(-8deg) scale(1.06)}
    25%{transform:rotate(8deg) scale(1.09)}
    50%{transform:rotate(-5deg) scale(1.06)}
    75%{transform:rotate(5deg) scale(1.08)}
    100%{transform:rotate(0) scale(1)}
  }
  .baton.thinking { animation: wobble .4s ease-in-out 3; }
  .result-text {
    margin-top: 8px;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    min-height: 32px;
    transition: opacity .25s;
  }
  .result-text.fade { opacity: 0; }
  .result-label {
    font-size: 11px;
    color: #555;
    margin-top: 4px;
    min-height: 18px;
    letter-spacing: 0.04em;
  }
  .history-wrap {
    margin-top: 0.8rem;
    width: 100%;
  }
  .history-label {
    font-size: 10px;
    color: #444;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .history-list {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    justify-content: center;
  }
  .hist-tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 999px;
    background: #111;
    color: #555;
    border: 1px solid #222;
  }
  .etsy-link {
    display: inline-block;
    margin-top: 1rem;
    margin-bottom: 0.5rem;
    font-size: 12px;
    color: #f97316;
    text-decoration: none;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-bottom: 1px solid #f97316;
    padding-bottom: 2px;
    transition: opacity .15s;
  }
  .etsy-link:hover { opacity: 0.7; }
</style>
</head>

const LABELS = {
  neutral: "the loaf is unbothered",
  dead:    "the loaf has perished",
  evil:    "the loaf enjoys your suffering",
  sad:     "the loaf feels your pain. a little.",
  cool:    "the loaf approves"
};

let mode = 2;
let history = [];
const img = document.getElementById('baton');
const resultText = document.getElementById('result-text');
const resultLabel = document.getElementById('result-label');

function setSticker(mood) {
  img.src = STICKERS[mood];
}

function setMode(m) {
  mode = m;
  ['2','6','custom'].forEach(x => document.getElementById('m'+x).classList.remove('active'));
  document.getElementById('m'+m).classList.add('active');
  renderOptions();
}

function getOptions() {
  return [...document.querySelectorAll('.opt-input,.dice-cell')]
    .map(i => i.value.trim()).filter(Boolean);
}

function renderOptions() {
  const wrap = document.getElementById('options-wrap');
  const addBtn = document.getElementById('add-btn');
  wrap.innerHTML = '';
  addBtn.style.display = 'none';

  if (mode === 2) {
    ['yes','no'].forEach((v, i) => {
      const row = document.createElement('div');
      row.className = 'opt-row';
      const inp = document.createElement('input');
      inp.className = 'opt-input';
      inp.value = v;
      inp.placeholder = 'option ' + (i+1);
      row.appendChild(inp);
      wrap.appendChild(row);
    });
  } else if (mode === 6) {
    const grid = document.createElement('div');
    grid.className = 'dice-grid';
    for (let i = 1; i <= 6; i++) {
      const inp = document.createElement('input');
      inp.className = 'dice-cell';
      inp.value = String(i);
      grid.appendChild(inp);
    }
    wrap.appendChild(grid);
  } else {
    ['', ''].forEach((v, i) => addOptRow(wrap, v, i));
    addBtn.style.display = 'block';
  }
}

function addOptRow(wrap, val, idx) {
  const row = document.createElement('div');
  row.className = 'opt-row';
  const inp = document.createElement('input');
  inp.className = 'opt-input';
  inp.value = val;
  inp.placeholder = 'option ' + ((idx !== undefined ? idx : wrap.children.length) + 1);
  const del = document.createElement('button');
  del.className = 'del-btn';
  del.textContent = '×';
  del.onclick = () => row.remove();
  row.appendChild(inp);
  row.appendChild(del);
  wrap.appendChild(row);
}

function addOpt() {
  const wrap = document.getElementById('options-wrap');
  addOptRow(wrap, '', wrap.children.length);
  wrap.lastElementChild.querySelector('input').focus();
}

function pickMood(picked, opts) {
  const p = picked.toLowerCase();
  const yesish = ['yes','yeah','yep','sure','ok','1','2','3'];
  const noish = ['no','nope','never','nah'];
  if (yesish.some(w => p.includes(w))) return 'cool';
  if (noish.some(w => p.includes(w))) return 'sad';
  const idx = opts.indexOf(picked);
  const ratio = idx / Math.max(opts.length - 1, 1);
  if (ratio < 0.2) return 'cool';
  if (ratio > 0.8) return 'dead';
  if (ratio > 0.5) return 'evil';
  return 'neutral';
}

function roll() {
  const opts = getOptions();
  if (opts.length < 2) { alert('need at least 2 options'); return; }

  img.classList.add('hide');
  resultText.classList.add('fade');

  setTimeout(() => {
    img.src = STICKERS.neutral;
    img.classList.remove('hide');
    img.classList.add('thinking');
  }, 200);

  setTimeout(() => {
    const pick = opts[Math.floor(Math.random() * opts.length)];
    const mood = pickMood(pick, opts);
    img.classList.remove('thinking');
    img.classList.add('hide');

    setTimeout(() => {
      setSticker(mood);
      img.classList.remove('hide');
      resultText.textContent = pick;
      resultText.classList.remove('fade');
      resultLabel.textContent = LABELS[mood];

      history.unshift(pick);
      if (history.length > 8) history.pop();
      const hw = document.getElementById('history-wrap');
      const hl = document.getElementById('history-list');
      if (history.length > 1) {
        hw.style.display = 'block';
        hl.innerHTML = history.slice(1).map(h => `<span class="hist-tag">${h}</span>`).join('');
      }
    }, 200);
  }, 1400);
}

renderOptions();
</script>
